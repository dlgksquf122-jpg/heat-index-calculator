<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체감온도 계산기 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'맑은 고딕',sans-serif;
background:linear-gradient(135deg,#5ec8ff,#d9f1ff);
padding:20px;
}

.container{
max-width:550px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
margin-top:5px;
font-size:17px;
border-radius:10px;
border:1px solid #ccc;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
text-align:center;
font-size:18px;
font-weight:bold;
transition:.3s;
}

.safe{background:#d8ffd8;color:#007700;}
.caution{background:#fff6c7;color:#8a6d00;}
.danger{background:#ffd4a8;color:#b14d00;}
.extreme{background:#ff6b6b;color:#fff;}

.tip{
margin-top:15px;
font-size:15px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>🌡 체감온도 계산기 PRO</h1>

<label>기온(℃)</label>
<input type="number" id="temp" placeholder="예 : 33">

<label>습도(%)</label>
<input type="number" id="humidity" placeholder="예 : 70">

<label>풍속(m/s)</label>
<input type="number" id="wind" placeholder="예 : 2">

<div id="result" class="result">

값을 입력하세요.

</div>

</div>

</div>

<script>

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calc);
});

function calc(){

let T=parseFloat(temp.value);
let R=parseFloat(humidity.value);
let W=parseFloat(wind.value);

if(isNaN(T)||isNaN(R)) return;

if(isNaN(W)) W=1.5;

let feel=T;

// ===== 여름 =====

// ===== 한국형 체감온도 =====
    if (T >= 28) {

    feel = T;

    // 습도 영향
    feel += (R - 40) * 0.03;

    // 기온 영향
    feel += (T - 28) * 0.08;

}

// ===== 겨울 =====

else if(T<=10 && W>1.3){

feel=
13.12+
0.6215*T-
11.37*Math.pow(W,0.16)+
0.3965*T*Math.pow(W,0.16);

}

// ===== 불쾌지수 =====

let DI=
0.81*T+
0.01*R*(0.99*T-14.3)+
46.3;

let level="";
let advice="";
let cls="";

if(feel<20){

level="😊 매우 쾌적";
cls="safe";
advice="야외활동하기 좋은 날씨입니다.";

}

else if(feel<27){

level="🙂 쾌적";
cls="safe";
advice="활동하기 무난합니다.";

}

else if(feel<32){

level="🟡 조금 더움";
cls="caution";
advice="수분을 자주 섭취하세요.";

}

else if(feel<41){

level="🟠 매우 더움";
cls="danger";
advice="장시간 야외활동을 줄이세요.";

}

else{

level="🔴 폭염 위험";
cls="extreme";
advice="외출을 자제하고 충분한 휴식을 취하세요.";

}

result.className="result "+cls;

result.innerHTML=`

<div style="font-size:40px;">
${feel.toFixed(1)}℃
</div>

<div style="margin-top:10px;">
${level}
</div>

<hr style="margin:15px 0;">

체감온도 : <b>${feel.toFixed(1)}℃</b><br>

불쾌지수 : <b>${DI.toFixed(1)}</b><br>

습도 : <b>${R}%</b><br>

풍속 : <b>${W}m/s</b>

<div class="tip">

💡 ${advice}

</div>

`;

}

</script>

</body>
</html>
